<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0E1B33"/>
<title>Quiniela Mundial 2026</title>

<!-- Firebase SDK -->

<style>
/* ===== TOKENS ===== */
:root{
  --navy:#0E1B33; --navy2:#16284A; --ink:#1D2530; --ink2:#222E3E;
  --panel:#1A2840; --panel2:#1E2E44; --line:rgba(39,57,92,.6); --line2:rgba(90,120,170,.3);
  --text:#D8E4F0; --muted:#7A90AB; --muted2:#4A5E76;
  --pitch:#15A85A; --pitchl:#E4F7EC;
  --gold:#F6C544; --goldl:#FCF1D6;
  --coral:#FF5C79; --corall:#FCE4E8;
  --sky:#5AA9FF; --skyl:#E5EEF8;
  --disp:'Barlow Condensed',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{background:var(--navy);color:var(--text);font-family:var(--body);font-size:16px}
body{min-height:100dvh;overscroll-behavior:none}

/* ===== LAYOUT ===== */
#root{
  max-width:600px; margin:0 auto;
  padding:0 12px calc(80px + env(safe-area-inset-bottom)) 12px;
  padding-top:0;
}
@media(min-width:640px){#root{padding-bottom:40px;padding-left:20px;padding-right:20px}}

/* ===== FONTS ===== */
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700;800&display=swap');

/* ===== HEADER ===== */
header.app{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg,var(--navy) 85%,transparent);
  padding:10px 0 6px;
}
.brandrow{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow:hidden}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ball{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff 10%,var(--pitch) 45%,#0a5e30);
  box-shadow:0 2px 8px rgba(21,168,90,.5);flex-shrink:0}
.ttl{font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.5px;text-transform:uppercase;line-height:1}
.ttl small{display:block;font-size:9px;letter-spacing:2px;color:var(--pitch);font-weight:700}
.hdrbtns{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.pillbtn{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);border:1px solid var(--line2);
  color:var(--text);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;font-family:var(--body);
  max-width:36vw;overflow:hidden;
}
.pillbtn .ico{font-size:13px;flex-shrink:0}
.pillbtn .tx{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pillbtn:active{background:rgba(255,255,255,.12)}

/* ===== NAV ===== */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;gap:0;
  background:var(--ink);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:transparent;color:var(--muted);border:none;
  padding:10px 4px;font-size:10px;font-weight:600;cursor:pointer;
  font-family:var(--body);position:relative;
}
.tab .ti{font-size:20px;line-height:1}
.tab.active{color:var(--pitch)}
.tab.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--pitch);border-radius:0 0 2px 2px}
.navbadge{
  position:absolute;top:6px;right:calc(50% - 18px);
  min-width:16px;height:16px;padding:0 4px;border-radius:9px;
  background:var(--coral);color:#fff;font-size:9px;font-weight:800;
  line-height:16px;text-align:center;pointer-events:none;
}
@media(min-width:640px){
  nav.tabs{position:static;border-top:none;border-radius:14px;margin-top:10px;
    background:var(--panel);border:1px solid var(--line);padding:4px;gap:4px}
  .tab{border-radius:10px;padding:8px 12px;flex-direction:row;gap:6px;font-size:12px}
  .tab.active::after{display:none}
  .tab.active{background:var(--pitch);color:#fff}
  .navbadge{top:2px;right:2px}
}

/* ===== SECTIONS ===== */
.section{margin-top:16px}
.section h2{
  font-family:var(--disp);font-size:17px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.section h2 .bar{width:3px;height:16px;background:var(--pitch);border-radius:2px;display:inline-block;flex-shrink:0}

/* ===== CARDS ===== */
.card{
  background:linear-gradient(180deg,var(--panel),var(--ink2));
  border:1px solid var(--line);border-radius:14px;overflow:hidden;
  margin-bottom:10px;
}
.card.pad{padding:13px}
.sep{height:1px;background:var(--line);margin:10px 0}

/* ===== CHIPS ===== */
.chip{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:999px;text-transform:uppercase}
.chip.green{background:rgba(21,168,90,.15);color:var(--pitch);border:1px solid rgba(21,168,90,.3)}
.chip.coral{background:rgba(255,92,121,.15);color:var(--coral);border:1px solid rgba(255,92,121,.3)}
.chip.gold{background:rgba(246,197,68,.15);color:var(--gold);border:1px solid rgba(246,197,68,.3)}
.chip.ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--line)}

/* ===== MATCH CARD ===== */
.match .top{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px 3px;font-size:10px;color:var(--muted2);
  border-bottom:1px solid rgba(39,57,92,.4);
}
.match .top .grp{font-family:var(--disp);font-weight:800;font-size:11px;color:var(--gold);text-transform:uppercase}
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;padding:8px 10px 10px}
.team{display:flex;align-items:center;gap:6px;min-width:0}
.team.home{justify-content:flex-start}
.team.away{justify-content:flex-end;flex-direction:row-reverse}
.flag{font-size:24px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.4));flex-shrink:0}
.tname{
  font-family:var(--disp);font-weight:700;font-size:14px;text-transform:uppercase;
  letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:var(--text);
}
@media(min-width:420px){.tname{font-size:16px}.flag{font-size:28px}}
.center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:68px;flex-shrink:0}
.ktime{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--text)}
.kday{font-size:9px;color:var(--muted2)}
.vs{font-family:var(--disp);font-weight:800;color:var(--muted2);font-size:12px}
.actual{font-family:var(--mono);font-weight:800;font-size:16px;color:var(--gold)}
.midscore{font-family:var(--mono);font-weight:800;font-size:28px;letter-spacing:1px}
.ko{display:flex;align-items:center;gap:12px;padding:12px}
/* Stepper */
.stepper{display:flex;flex-direction:column;align-items:center;gap:0}
.stepper .num{font-family:var(--mono);font-weight:800;font-size:24px;min-width:28px;text-align:center;color:var(--text);line-height:1.1}
.stepper .sbtn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--line2);
  background:rgba(255,255,255,.04);color:var(--text);font-weight:800;font-size:16px;
  line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.stepper .sbtn:active{background:var(--pitch);border-color:var(--pitch)}
.stepper .sbtn:disabled{opacity:.3;cursor:not-allowed}
/* Score result line */
.savedline{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 12px 10px;border-top:1px dashed var(--line);font-size:11px;color:var(--muted);
}
.ptsbadge{font-family:var(--mono);font-weight:800;font-size:11px;padding:3px 7px;border-radius:8px}
.ptsbadge.p0{background:rgba(255,92,121,.1);color:#ff9fb0}
.ptsbadge.p1{background:rgba(21,168,90,.12);color:#6dffb2}
.ptsbadge.p2{background:rgba(246,197,68,.12);color:#ffd96b}
.ptsbadge.p3{background:rgba(90,169,255,.14);color:#a9cfff}

/* ===== DAYHDR ===== */
.dayhdr{
  position:sticky;top:90px;z-index:20;
  display:flex;align-items:baseline;gap:8px;
  background:linear-gradient(180deg,var(--navy) 70%,transparent);
  padding:8px 0 6px;margin-bottom:6px;
}
@media(min-width:640px){.dayhdr{top:100px}}
.dayhdr .dnum{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--gold)}
.dayhdr .dtxt{font-family:var(--disp);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px}
.dayhdr .dmeta{margin-left:auto;font-size:10px;color:var(--muted2)}
.daybar{font-family:var(--disp);font-weight:800;font-size:13px;letter-spacing:.5px;text-transform:uppercase;
  color:var(--gold);padding:8px 2px 4px;border-bottom:1px solid var(--line);margin-bottom:8px}

/* ===== BUTTONS ===== */
button{cursor:pointer;font-family:var(--body)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--text);
  border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;
  font-family:var(--body);width:auto;transition:background .15s;
}
.btn:active{background:rgba(255,255,255,.12)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--pitch);border-color:var(--pitch);color:#fff}
.btn.primary:active{background:#11904c}
.btn.ghost{background:transparent;border-color:var(--line2);color:var(--muted)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#3a2c00}
.btn.sm{padding:7px 10px;font-size:11.5px;border-radius:8px}
.btn.danger{color:var(--coral);border-color:rgba(255,92,121,.3)}
.row{display:flex;align-items:center}
.row.between{justify-content:space-between}

/* ===== FILTERS ===== */
.filterbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.fb{
  padding:6px 12px;border-radius:999px;border:1px solid var(--line2);
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;
  font-family:var(--body);cursor:pointer;
}
.fb.active{background:var(--pitch);border-color:var(--pitch);color:#fff}
.fb:disabled{opacity:.5;cursor:not-allowed}

/* ===== FIELDS / INPUTS ===== */
.field{display:flex;flex-direction:column;gap:5px;margin-top:12px}
.field label{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);font-weight:700}
.bare{
  background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--text);
  border-radius:10px;padding:9px 11px;font-size:14px;font-family:var(--body);width:100%;
}
.bare:focus{outline:none;border-color:var(--sky)}
select.bare{-webkit-appearance:none;appearance:none}

/* ===== TABLE ===== */
.standings{width:100%;border-collapse:collapse;font-size:13px}
.standings th{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);
  padding:6px 8px;text-align:center;border-bottom:1px solid var(--line)}
.standings th:first-child{text-align:left}
.standings td{padding:8px;text-align:center;border-bottom:1px solid rgba(39,57,92,.3)}
.standings td:first-child{text-align:left}
.standings tr.me td{background:rgba(21,168,90,.07)}

/* ===== MISC ===== */
.hint{
  background:rgba(90,169,255,.06);border:1px solid rgba(90,169,255,.25);
  border-radius:10px;padding:10px;font-size:12px;line-height:1.5;color:var(--muted);
}
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}
.toast{
  position:fixed;bottom:calc(72px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%);
  background:var(--pitch);color:#fff;padding:9px 18px;border-radius:999px;
  font-size:13px;font-weight:600;z-index:999;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  animation:toastin .2s ease;
}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(min-width:640px){.toast{bottom:60px}}
.mono{font-family:var(--mono);font-weight:800}
.muted{color:var(--muted)}
.muted2{color:var(--muted2)}
.small{font-size:11.5px}
.disp{font-family:var(--disp)}
.kvs{display:flex;gap:14px;flex-wrap:wrap}
.kv{display:flex;flex-direction:column}
.kv .k{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2)}
.kv .v{font-family:var(--mono);font-weight:800;font-size:18px}
.emojigrid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.emojigrid button{font-size:20px;background:rgba(255,255,255,.04);border:1px solid var(--line2);
  border-radius:8px;padding:6px 8px;cursor:pointer}
.emojigrid button.sel{border-color:var(--gold);background:rgba(246,197,68,.1)}

/* ===== ACCESS / JOIN ===== */
.joincard{text-align:center;padding:24px 16px}
.joincard .ji{font-size:36px;margin-bottom:8px}
.joincard h3{font-family:var(--disp);font-size:20px;font-weight:800;text-transform:uppercase;margin-bottom:8px}
.userrow{padding:10px 0;border-bottom:1px solid rgba(39,57,92,.4)}
.userrow:last-child{border-bottom:none}

/* ===== COMODINES ===== */
.cmdbar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px 12px;border-top:1px dashed var(--line)}
.cmd{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);
  background:rgba(255,255,255,.03);color:var(--muted);border-radius:999px;
  padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
.cmd .ci{font-size:13px}
.cmd .cn{font-size:9px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.cmd:active:not([disabled]){border-color:var(--gold);color:var(--text)}
.cmd[disabled]{opacity:.4;cursor:not-allowed}
.cmd.on{background:var(--gold);border-color:var(--gold);color:#3a2c00}
.cmd.on.shield{background:var(--sky);border-color:var(--sky);color:#04243f}
.cmd.on.spy{background:#b98cff;border-color:#b98cff;color:#240a45}
.spy{flex-basis:100%;margin-top:4px;background:rgba(185,140,255,.08);
  border:1px solid rgba(185,140,255,.3);border-radius:10px;padding:8px 10px}
.spyrow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.cmdtag{font-family:var(--disp);font-weight:800;font-size:10px;letter-spacing:.4px;
  padding:2px 6px;border-radius:7px;text-transform:uppercase;margin-left:5px}
.cmdtag.dbl{background:rgba(246,197,68,.18);color:#ffd96b;border:1px solid rgba(246,197,68,.4)}
.cmdtag.shd{background:rgba(90,169,255,.16);color:#a9cfff;border:1px solid rgba(90,169,255,.35)}
.cmdtag.hlf{background:rgba(255,92,121,.14);color:#ff9fb0;border:1px solid rgba(255,92,121,.3)}
.cmdcards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
@media(max-width:480px){.cmdcards{grid-template-columns:1fr}}
.cmdcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px}
.cmdcard .ch{display:flex;align-items:center;gap:6px;font-family:var(--disp);font-weight:800;font-size:14px;text-transform:uppercase}
.cmdcard .cleft{margin-left:auto;font-family:var(--mono);font-weight:800;font-size:14px;color:var(--gold)}
.cmdcard p{margin:5px 0 0;font-size:11px;color:var(--muted)}

/* ===== HALFTIME ===== */
.htpanel{margin:0 10px 10px;background:rgba(246,197,68,.07);border:1px solid rgba(246,197,68,.3);
  border-radius:10px;padding:10px 10px 4px}
.htdot{width:7px;height:7px;border-radius:50%;background:var(--coral);
  box-shadow:0 0 0 0 rgba(255,92,121,.6);animation:pulse 1.6s infinite;display:inline-block}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,92,121,.5)}70%{box-shadow:0 0 0 7px rgba(255,92,121,0)}100%{box-shadow:0 0 0 0 rgba(255,92,121,0)}}

/* ===== MODALS ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
@media(min-width:500px){.overlay{align-items:center}}
.modal{
  background:var(--navy2);border:1px solid var(--line);
  border-radius:20px 20px 0 0;padding:20px 16px;
  width:100%;max-width:460px;max-height:90dvh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
@media(min-width:500px){.modal{border-radius:20px}}
.modal-title{font-family:var(--disp);font-weight:800;font-size:20px;text-transform:uppercase;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.4}
.modal-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.08);
  border:none;color:var(--muted);border-radius:50%;width:28px;height:28px;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ===== LOADING ===== */
/* 6-tab nav: smaller labels */
@media(max-width:440px){.tab{font-size:8.5px;padding:7px 1px}.tab .ti{font-size:16px}}

/* ===== MURO DE LA VERGÜENZA ===== */
.muro-card{background:linear-gradient(135deg,rgba(255,92,121,.1),rgba(255,92,121,.03));border:1px solid rgba(255,92,121,.4);border-radius:16px;padding:16px;margin-bottom:10px;text-align:center;position:relative;overflow:hidden}
.home-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;align-items:stretch}
.home-split .muro-card{margin-bottom:0;padding:12px 8px;height:120px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.home-split .muro-trophy{font-size:28px;margin-bottom:2px}
.home-split .muro-name{font-size:13px}
.home-split .muro-title{font-size:8.5px}
.home-split .muro-pts{font-size:10px}
.home-split .muro-msg{font-size:9.5px}
.gol-card{background:linear-gradient(135deg,rgba(246,197,68,.1),rgba(246,197,68,.03));border:1px solid rgba(246,197,68,.4);border-radius:16px;padding:12px 8px;text-align:center;position:relative;overflow:hidden;height:120px;display:flex;flex-direction:column;justify-content:center}
.gol-title{font-size:8.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.gol-list{display:grid;gap:5px;text-align:left}
.gol-row{display:flex;align-items:center;gap:6px;font-size:11px}
.gol-row .gp{font-family:var(--mono);font-weight:800;color:var(--muted2);width:14px;flex-shrink:0}
.gol-row .gn{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gol-row .gv{font-family:var(--mono);font-weight:800;color:var(--gold);flex-shrink:0}
.gol-empty{font-size:24px;margin-bottom:4px}

/* ===== STANDINGS BREAKDOWN ===== */
.std-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.std-row.me{border-color:rgba(21,168,90,.4);background:rgba(21,168,90,.05)}
.std-head{display:flex;align-items:center;gap:10px;cursor:pointer}
.std-pos{font-family:var(--mono);font-weight:800;font-size:13px;color:var(--muted2);width:20px;flex-shrink:0}
.std-name{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.std-pts{font-family:var(--mono);font-weight:800;font-size:18px;color:var(--gold);flex-shrink:0}
.std-chev{font-size:14px;color:var(--muted2);flex-shrink:0;transition:transform .15s}
.std-chev.open{transform:rotate(90deg)}
.std-breakdown{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:grid;gap:6px}
.std-concept{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.std-concept .sc-label{color:var(--muted);display:flex;align-items:center;gap:6px}
.std-concept .sc-val{font-family:var(--mono);font-weight:700;color:var(--text)}
.std-concept .sc-val.zero{color:var(--muted2)}

function getCartaCandidate(results, now, history) {
  const dynamic = [];

  // Goals so far + comparison to 2022
  const played = GROUPS.filter(g => {
    const r = results.matches?.[g.id];
    return r && r.h != null && r.a != null;
  });
  if (played.length > 0) {
    let totalGoals = 0;
    played.forEach(g => { const r = results.matches[g.id]; totalGoals += (r.h||0)+(r.a||0); });
    const avg = (totalGoals / played.length);
    const avg2022 = 2.69;
    const diff = avg - avg2022;
    const pct = Math.abs(Math.round((diff/avg2022)*100));
    dynamic.push({emoji:"⚽", text:
      `Van ${totalGoals} goles en ${played.length} partido${played.length!==1?"s":""} del Mundial 2026 — promedio de ${avg.toFixed(2)} por partido. `
      + (diff >= 0
        ? `Eso es ${pct}% más goleador que el promedio de Qatar 2022 (2.69 por partido).`
        : `Eso es ${pct}% menos goleador que el promedio de Qatar 2022 (2.69 por partido).`)
    });

    // Highest scoring match so far
    let best = null;
    played.forEach(g => {
      const r = results.matches[g.id];
      const total = (r.h||0)+(r.a||0);
      if (!best || total > best.total) best = {g, r, total};
    });
    if (best && best.total >= 3) {
      dynamic.push({emoji:"🔥", text:
        `El partido más goleador hasta ahora: ${tName(best.g.home)} ${best.r.h}-${best.r.a} ${tName(best.g.away)}, con ${best.total} goles.`
      });
    }

    // Clean sheets count
    const cleanSheets = played.filter(g => { const r=results.matches[g.id]; return r.h===0||r.a===0; }).length;
    if (cleanSheets > 0) {
      dynamic.push({emoji:"🧱", text:
        `${cleanSheets} de ${played.length} partidos jugados terminaron con al menos un equipo en cero.`
      });
    }
  }

  // Days since tournament started
  const daysSinceStart = Math.floor((now - FIRST_KICKOFF.getTime()) / 86400000);
  if (daysSinceStart >= 0) {
    dynamic.push({emoji:"📅", text:
      `Llevamos ${daysSinceStart} día${daysSinceStart!==1?"s":""} desde el pitazo inicial del Mundial 2026.`
    });
  } else {
    const daysToStart = Math.abs(daysSinceStart);
    dynamic.push({emoji:"⏳", text:
      `Faltan ${daysToStart} día${daysToStart!==1?"s":""} para el pitazo inicial del Mundial 2026.`
    });
  }

  // Days until final
  const daysToFinal = Math.ceil((FINAL_KICKOFF.getTime() - now) / 86400000);
  if (daysToFinal > 0) {
    dynamic.push({emoji:"🏁", text:
      `Faltan ${daysToFinal} día${daysToFinal!==1?"s":""} para la gran final del Mundial 2026 en Nueva York/NJ.`
    });
  }

  // Days since the very first World Cup ever (13 July 1930)
  const firstEverWC = new Date("1930-07-13T00:00:00Z");
  const yearsSinceFirst = ((now - firstEverWC.getTime()) / (365.25*86400000)).toFixed(0);
  dynamic.push({emoji:"🕰️", text:
    `Han pasado ${yearsSinceFirst} años desde el primer partido de la historia de los Mundiales (Uruguay 1930).`
  });

  const pool = [...CARTA_STATIC, ...dynamic];
  const used = new Set(history || []);
  const fresh = pool.filter(c => !used.has(c.text));
  const finalPool = fresh.length > 0 ? fresh : pool; // if all used, allow repeats
  return finalPool[Math.floor(Math.random()*finalPool.length)];
}

/* =========================================================
   FIREBASE INIT + DB HELPERS
   (inicialización se hace dentro del componente App
    para que ocurra solo una vez y en el browser)
   ========================================================= */
let _db = null;
function getDb() {
  if (!_db) {
    try {
      const app = firebase.initializeApp(firebaseConfig);
      _db = firebase.database(app);
    } catch (e) {
      // ya estaba inicializado
      _db = firebase.database();
    }
  }
  return _db;
}
// Helpers de lectura/escritura sobre Firebase
async function fbGet(path) {
  try {
    const snap = await getDb().ref(path).get();
    return snap.exists() ? snap.val() : null;
  } catch (e) {
    console.error("fbGet", path, e);
    return null;
  }
}
async function fbSet(path, value) {
  try {
    await getDb().ref(path).set(value);
  } catch (e) {
    console.error("fbSet", path, e);
  }
}
async function fbUpdate(path, value) {
  try {
    await getDb().ref(path).update(value);
  } catch (e) {
    console.error("fbUpdate", path, e);
  }
}
// Suscripción realtime; devuelve función de cleanup
function fbListen(path, cb) {
  const ref = getDb().ref(path);
  ref.on("value", snap => cb(snap.exists() ? snap.val() : null));
  return () => ref.off("value");
}

/* =========================================================
   HELPERS
   ========================================================= */
const DOW = ["dom", "lun", "mar", "mié", "jue", "vie", "sáb"];
const MON = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
function parts(date, tz) {
  const f = new Intl.DateTimeFormat("en-CA", {
    timeZone: tz,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
    weekday: "short"
  });
  const o = {};
  f.formatToParts(date).forEach(p => o[p.type] = p.value);
  return o;
}
function dayKey(date, tz) {
  const p = parts(date, tz);
  return p.year + "-" + p.month + "-" + p.day;
}
function fmtTime(date, tz) {
  const p = parts(date, tz);
  return p.hour + ":" + p.minute;
}
function dayLabel(date, tz) {
  const p = parts(date, tz);
  const d = new Date(p.year + "-" + p.month + "-" + p.day + "T12:00:00Z");
  const dow = DOW[d.getUTCDay()];
  return {
    dow,
    dnum: String(+p.day),
    mon: MON[+p.month - 1]
  };
}
function isLocked(m) {
  return Date.now() >= m.kickoff.getTime();
}
function clamp(n) {
  return Math.max(0, Math.min(19, n));
}
const uid = () => Math.random().toString(36).slice(2, 9);
const genCode = () => {
  const C = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += C[Math.floor(Math.random() * C.length)];
  return s;
};
const hashStr = s => {
  let h = 5381;
  s = String(s);
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) + h + s.charCodeAt(i) | 0;
  }
  return "h" + (h >>> 0).toString(36);
};
function normPool(p) {
  const {
    requests,
    ...rest
  } = p;
  return {
    gate: true,
    members: [],
    scoring: {
      ...DEFAULT_SCORING
    },
    comodines: {
      ...DEFAULT_COMODINES
    },
    mode: "dynamic",
    ...rest,
    invite: p.invite || genCode(),
    mode: p.mode === "classic" ? "classic" : "dynamic"
  };
}

/* =========================================================
   SCORING ENGINE
   ========================================================= */
function scoreOne(pred, actual, sc) {
  if (!actual || actual.h == null || actual.a == null) return null;
  if (!pred || pred.h == null || pred.a == null) return {
    pts: 0,
    exact: false,
    outcome: false
  };
  const po = Math.sign(pred.h - pred.a),
    ao = Math.sign(actual.h - actual.a);
  const outcome = po === ao,
    exact = pred.h === actual.h && pred.a === actual.a,
    gd = pred.h - pred.a === actual.h - actual.a;
  let pts = 0;
  if (exact) pts = sc.exact;else if (outcome && gd && sc.useGd) pts = sc.gd;else if (outcome) pts = sc.win;
  return {
    pts,
    exact,
    outcome
  };
}
function scoreFull(pred, actual, sc, opt) {
  const base = scoreOne(pred, actual, sc);
  if (!base) return null;
  let pts = base.pts,
    halved = false,
    doubled = false,
    shielded = false;
  if (pred && pred.ht && pts > 0) {
    pts = Math.round(pts / 2);
    halved = true;
  }
  if (opt && opt.doble) {
    pts = pts * 2;
    if (base.pts > 0) doubled = true;
  }
  if (opt && opt.escudo && pts < sc.win) {
    pts = sc.win;
    shielded = true;
  }
  return {
    pts,
    exact: base.exact,
    outcome: base.outcome,
    base: base.pts,
    halved,
    doubled,
    shielded
  };
}
